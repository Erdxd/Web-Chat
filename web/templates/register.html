<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .field {
            margin-bottom: 20px;
            position: relative;
        }

        .field input {
            width: 100%;
            padding: 14px 45px 14px 18px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        .field input:focus {
            border-color: #6c5ce7;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.3);
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #6c5ce7;
        }

        .spacer {
            height: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            border: none;
            outline: none;
            background: #6c5ce7;
            border-radius: 12px;
            color: #fff;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #5d4299;
            transform: translateY(-2px);
        }

        p {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        a {
            color: #a55eff;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #6c5ce7;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <form action="/auth/register" method="post" class="card">
        <label for="username">Имя пользователя</label>
        <div class="field">
            <input type="text" name="username" id="username" placeholder="Введите имя">
        </div>

        <label for="email">Электронная почта</label>
        <div class="field">
            <input type="email" name="email" id="email" placeholder="example@mail.com">
        </div>

        <label for="password">Придумайте пароль</label>
        <div class="field">
            <input type="password" name="password" id="password" placeholder="Введите пароль">
            <button type="button" class="toggle-password" data-target="password">🙉</button>
        </div>

        <label for="password_repeat">Повторите пароль</label>
        <div class="field">
            <input type="password" name="password_repeat" id="password_repeat" placeholder="Повтор пароля">
            <button type="button" class="toggle-password" data-target="password_repeat">🙉</button>
        </div>

        <div class="spacer"></div>

        <button type="submit" class="submit-btn">
            Зарегистрироваться 
        </button>
        <p>Уже есть аккаунт? <a href="/auth/login">Войдите</a></p>
    </form>

    <script>
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.textContent = '🙈';
                } else {
                    input.type = 'password';
                    this.textContent = '🙉';
                }
            });
        });
    </script>
</body>
</html>
