<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чат</title>

<style>
body {
    font-family: sans-serif;
    margin: 0;
}

.container {
    display: flex;
    height: 100vh;
}

.sidebar {
    width: 220px;
    border-right: 1px solid #ddd;
    padding: 10px;
}

.room {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
}

.room:hover {
    background: #f0f0f0;
}

.avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: #ccc;
}

.chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
}

.header {
    padding: 10px;
    border-bottom: 1px solid #ddd;
    font-weight: 600;
}

#chat {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
}

.msg {
    max-width: 65%;
    margin: 4px 0;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 14px;
}

.me {
    align-self: flex-end;
    border: 1px solid #ccc;
}

.other {
    align-self: flex-start;
    border: 1px solid #ddd;
}

.input-area {
    display: flex;
    border-top: 1px solid #ddd;
}

.input-area input {
    flex: 1;
    padding: 10px;
    border: none;
    outline: none;
}

.input-area button {
    padding: 10px 14px;
    border: none;
    cursor: pointer;
    background: none;
}
</style>
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div class="room" onclick="selectRoom('user1')">
            <div class="avatar"></div>
            <span>User1</span>
        </div>

        <div class="room" onclick="selectRoom('user2')">
            <div class="avatar"></div>
            <span>User2</span>
        </div>

        <div class="room" onclick="selectRoom('user3')">
            <div class="avatar"></div>
            <span>User3</span>
        </div>
    </div>

    <div class="chat-area">

        <div class="header">
            Чат: <span id="currentRoom">user1</span>
        </div>

        <div id="chat"></div>

        <div class="input-area">
            <input type="text" id="messageInput"
                   placeholder="Сообщение..."
                   onkeydown="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">➤</button>
        </div>

    </div>

</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('messageInput');
const currentRoomSpan = document.getElementById('currentRoom');

let currentRoom = "user1";
const userId = Math.random().toString(36).substring(7);

const socket = new WebSocket("ws://localhost:8080/ws");

socket.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.room !== currentRoom) return;

    const msgDiv = document.createElement('div');

    if (data.user === userId) {
        msgDiv.className = 'msg me';
    } else {
        msgDiv.className = 'msg other';
    }

    msgDiv.innerText = data.text;

    chat.appendChild(msgDiv);
    chat.scrollTop = chat.scrollHeight;
};

function selectRoom(room) {
    currentRoom = room;
    currentRoomSpan.innerText = room;
    chat.innerHTML = "";
}

function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    const msg = {
        user: userId,
        text: text,
        room: currentRoom
    };

    socket.send(JSON.stringify(msg));
    input.value = '';
}
</script>

</body>
</html>
