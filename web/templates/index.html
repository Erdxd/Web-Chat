<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1200px;
            height: 85vh;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* Боковая панель */
        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .room {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
        }

        .room:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .room.active {
            background: rgba(108, 92, 231, 0.3);
            border-left: 3px solid #6c5ce7;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a55eff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
        }

        /* Основная область чата */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .header {
            padding: 18px 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            color: white;
            font-size: 18px;
        }

        .header span {
            color: #6c5ce7;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Сообщения */
        .msg {
            max-width: 65%;
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .me {
            align-self: flex-end;
            background: linear-gradient(135deg, #6c5ce7, #a55eff);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border-bottom-left-radius: 4px;
        }

        .system {
            align-self: center;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            padding: 4px 12px;
            border-radius: 20px;
            max-width: 80%;
        }

        /* Поле ввода */
        .input-area {
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding: 16px 20px;
            gap: 12px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            color: white;
            font-size: 14px;
            outline: none;
            transition: all 0.3s;
        }

        .input-area input:focus {
            border-color: #6c5ce7;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.3);
        }

        .input-area input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-area button {
            background: linear-gradient(135deg, #6c5ce7, #a55eff);
            border: none;
            padding: 0 24px;
            border-radius: 30px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .input-area button:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.4);
        }

        /* Скроллбар */
        #chat::-webkit-scrollbar {
            width: 6px;
        }
        #chat::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }
        #chat::-webkit-scrollbar-thumb {
            background: #6c5ce7;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar" id="sidebar">
            <!-- Комнаты будут добавлены через JS -->
        </div>

        <div class="chat-area">
            <div class="header">
                Чат: <span id="currentRoom">загрузка...</span>
            </div>
            <div id="chat"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn">→</button>
            </div>
        </div>
    </div>

    <script>
        // === Данные ===
        const rooms = [
            { id: 'user1', name: 'User1', avatar: 'U1' },
            { id: 'user2', name: 'User2', avatar: 'U2' },
            { id: 'user3', name: 'User3', avatar: 'U3' }
        ];
        
        let currentRoom = 'user1';
        let userId = localStorage.getItem('chatUserId');
        if (!userId) {
            userId = 'user_' + Math.random().toString(36).substring(2, 10);
            localStorage.setItem('chatUserId', userId);
        }

        let ws = null;
        let messagesHistory = {}; // хранение истории по комнатам

        // === DOM элементы ===
        const sidebarEl = document.getElementById('sidebar');
        const chatEl = document.getElementById('chat');
        const currentRoomSpan = document.getElementById('currentRoom');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // === Функции ===
        function renderSidebar() {
            sidebarEl.innerHTML = '';
            rooms.forEach(room => {
                const roomDiv = document.createElement('div');
                roomDiv.className = `room ${currentRoom === room.id ? 'active' : ''}`;
                roomDiv.onclick = () => selectRoom(room.id);
                roomDiv.innerHTML = `
                    <div class="avatar">${room.avatar}</div>
                    <span>${room.name}</span>
                `;
                sidebarEl.appendChild(roomDiv);
            });
        }

        function selectRoom(roomId) {
            if (currentRoom === roomId) return;
            currentRoom = roomId;
            currentRoomSpan.innerText = rooms.find(r => r.id === roomId)?.name || roomId;
            
            // Отображаем историю сообщений для этой комнаты
            renderMessages();
            renderSidebar();
        }

        function renderMessages() {
            chatEl.innerHTML = '';
            const history = messagesHistory[currentRoom] || [];
            history.forEach(msg => {
                addMessageToChat(msg.text, msg.isMe, msg.isSystem);
            });
        }

        function addMessageToChat(text, isMe = false, isSystem = false) {
            const msgDiv = document.createElement('div');
            if (isSystem) {
                msgDiv.className = 'msg system';
            } else {
                msgDiv.className = `msg ${isMe ? 'me' : 'other'}`;
            }
            msgDiv.innerText = text;
            chatEl.appendChild(msgDiv);
            chatEl.scrollTop = chatEl.scrollHeight;
        }

        function addMessage(text, isMe = false, isSystem = false) {
            // Сохраняем в историю
            if (!messagesHistory[currentRoom]) messagesHistory[currentRoom] = [];
            messagesHistory[currentRoom].push({ text, isMe, isSystem });
            renderMessages();
        }

        // === WebSocket ===
        function connectWebSocket() {
            // Для локального теста без сервера используем заглушку
            // Реальный WebSocket: ws://localhost:8080/ws
            if (ws) ws.close();
            
            // Пытаемся подключиться к серверу
            try {
                ws = new WebSocket('ws://localhost:8080/ws');
                
                ws.onopen = () => {
                    addMessage('Подключено к серверу', false, true);
                };
                
                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        if (data.room === currentRoom && data.user !== userId) {
                            addMessage(data.text, false, false);
                        }
                    } catch(e) {}
                };
                
                ws.onerror = () => {
                    // Если сервер не запущен, работаем в офлайн-режиме
                    useOfflineMode();
                };
                
                ws.onclose = () => {
                    // переподключение через 3 секунды
                    setTimeout(connectWebSocket, 3000);
                };
            } catch(e) {
                useOfflineMode();
            }
        }
        
        let offlineMode = false;
        function useOfflineMode() {
            if (offlineMode) return;
            offlineMode = true;
            addMessage('⚠️ Сервер не запущен, сообщения не будут отправляться', false, true);
        }

        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            
            // Добавляем сообщение в чат
            addMessage(text, true, false);
            
            // Отправляем через WebSocket, если есть соединение
            if (ws && ws.readyState === WebSocket.OPEN) {
                const msg = {
                    user: userId,
                    text: text,
                    room: currentRoom
                };
                ws.send(JSON.stringify(msg));
            } else if (!offlineMode) {
                useOfflineMode();
            }
            
            messageInput.value = '';
        }

        // === Инициализация ===
        function init() {
            renderSidebar();
            currentRoomSpan.innerText = rooms[0].name;
            connectWebSocket();
            
            sendBtn.onclick = sendMessage;
            messageInput.onkeypress = (e) => {
                if (e.key === 'Enter') sendMessage();
            };
        }
        
        init();
    </script>
</body>
</html>
