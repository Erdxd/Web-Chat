<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            color: #ffffff;
            letter-spacing: 1px;
        }

        .field {
            margin-bottom: 20px;
            position: relative; /* Важно для позиционирования кнопки внутри */
        }

        .field input {
            width: 100%;
            padding: 14px 45px 14px 18px; /* Место справа для кнопки */
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
            outline: none;
        }

        .field input:focus {
            border-color: #6c5ce7;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.3);
        }

        .field input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c5ce7, #a55eff);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(108, 92, 231, 0.4);
        }

        p {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        a {
            color: #a55eff;
            text-decoration: none;
            transition: color 0.2s;
        }

        a:hover {
            color: #6c5ce7;
            text-decoration: underline;
        }

        /* Кнопка показа пароля внутри поля */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            font-size: 18px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: #6c5ce7;
        }
    </style>
</head>
<body>
    <form action="/auth/login" method="post" class="card">
        <div class="title">Вход</div>

        <label for="Email"></label>
        <div class="field">
            <input type="text" name="email" placeholder="Введите логин">
        </div>

        <div class="field">
            <input type="password" name="password" id="password" placeholder="Введите пароль">
            <button type="button" class="toggle-password" data-target="password">🙉</button>
        </div>

        <button type="submit" class="sumbit-btn">Войти</button>
        <p>Нет аккаунта? <a href="/auth/register">Зарегистрируйтесь.</a></p>
    </form>

    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const targetId = this.getAttribute('data-target');
                const input = document.getElementById(targetId);
                if (input.type === 'password') {
                    input.type = 'text';
                    this.textContent = '🙈';
                } else {
                    input.type = 'password';
                    this.textContent = '🙉';
                }
            });
        });
    </script>
</body>
</html>
